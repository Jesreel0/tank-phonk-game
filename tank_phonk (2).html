<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Melhor que do Edir 🏆🏆 - PHONK EDITION</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser-arcade-physics.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; touch-action: none; }
        canvas { display: block; }
    </style>
</head>
<body>
<script>
let difficulty = 'Medio';
let highScore = parseInt(localStorage.getItem('tankHighScore') || 0);

class MenuScene extends Phaser.Scene {
    constructor() { super('MenuScene'); }

    preload() {
        this.load.audio('musica_fundo', 'https://files.catbox.moe/7qhskm.mp3');
    }

    create() {
        const w = this.scale.width, h = this.scale.height;
        const g = this.make.graphics({x:0,y:0,add:false});

        // ── Fundo gradiente escuro ──────────────────────────────────────────
        g.fillGradientStyle(0x000000, 0x000000, 0x001a00, 0x001a00, 1);
        g.fillRect(0, 0, w, h);
        g.generateTexture('bg_grad', w, h); g.clear();
        this.add.image(0, 0, 'bg_grad').setOrigin(0);

        // Grade de linhas estilo tático
        g.lineStyle(1, 0x00ff00, 0.07);
        for (let x = 0; x < w; x += 40) { g.moveTo(x, 0); g.lineTo(x, h); }
        for (let y = 0; y < h; y += 40) { g.moveTo(0, y); g.lineTo(w, y); }
        g.strokePath();
        g.generateTexture('grid', w, h); g.clear();
        this.add.image(0, 0, 'grid').setOrigin(0).setAlpha(1);

        // ── Partículas de estrelas / faíscas ──────────────────────────────
        g.fillStyle(0xffffff).fillCircle(2,2,2); g.generateTexture('star',4,4); g.clear();
        g.fillStyle(0x00ff00).fillCircle(3,3,3); g.generateTexture('spark',6,6); g.clear();

        this.add.particles(0, 0, 'star', {
            x: { min: 0, max: w }, y: { min: 0, max: h },
            speedY: { min: -8, max: -30 }, speedX: { min: -4, max: 4 },
            scale: { start: 0.6, end: 0 }, alpha: { start: 0.5, end: 0 },
            lifespan: { min: 2500, max: 5000 }, quantity: 1, frequency: 60,
            tint: [0x00ff00, 0x00ff88, 0xffffff, 0xffff00]
        });

        // Faíscas laterais decorativas
        this.add.particles(0, h * 0.35, 'spark', {
            speedX: { min: 20, max: 80 }, speedY: { min: -30, max: 30 },
            scale: { start: 0.8, end: 0 }, alpha: { start: 0.9, end: 0 },
            lifespan: 600, quantity: 1, frequency: 120, tint: 0x00ff44
        });
        this.add.particles(w, h * 0.35, 'spark', {
            speedX: { min: -80, max: -20 }, speedY: { min: -30, max: 30 },
            scale: { start: 0.8, end: 0 }, alpha: { start: 0.9, end: 0 },
            lifespan: 600, quantity: 1, frequency: 120, tint: 0x00ff44
        });

        // ── Painel central semi-transparente ──────────────────────────────
        const panelW = Math.min(w * 0.82, 420), panelH = h * 0.78;
        const panelX = w/2 - panelW/2, panelY = h * 0.11;
        g.fillStyle(0x000000, 0.55).fillRoundedRect(0, 0, panelW, panelH, 18);
        g.lineStyle(2, 0x00ff00, 0.5).strokeRoundedRect(0, 0, panelW, panelH, 18);
        g.generateTexture('panel', panelW, panelH); g.clear();
        this.add.image(panelX, panelY, 'panel').setOrigin(0).setDepth(1);

        // Cantos decorativos do painel
        const cornerSize = 18;
        [[panelX, panelY], [panelX+panelW-cornerSize, panelY],
         [panelX, panelY+panelH-cornerSize], [panelX+panelW-cornerSize, panelY+panelH-cornerSize]].forEach(([cx, cy]) => {
            g.lineStyle(3, 0x00ff88, 1).strokeRect(0, 0, cornerSize, cornerSize);
            g.generateTexture('corner_'+cx+'_'+cy, cornerSize, cornerSize); g.clear();
            this.add.image(cx, cy, 'corner_'+cx+'_'+cy).setOrigin(0).setDepth(2);
        });

        // ── Logo / título ─────────────────────────────────────────────────
        // Sombra do título
        this.add.text(w/2 + 3, h * 0.175 + 3, 'TANK PHONK', {
            fontSize: Math.min(54, w * 0.11) + 'px', fontStyle: 'bold', fill: '#003300'
        }).setOrigin(0.5).setDepth(2);

        const titleText = this.add.text(w/2, h * 0.175, 'TANK PHONK', {
            fontSize: Math.min(54, w * 0.11) + 'px', fontStyle: 'bold', fill: '#00ff44',
            stroke: '#004400', strokeThickness: 4
        }).setOrigin(0.5).setDepth(3);

        // Pulso no título
        this.tweens.add({
            targets: titleText, scaleX: 1.03, scaleY: 1.03,
            duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut'
        });

        // Subtítulo com linha decorativa
        const subY = h * 0.265;
        g.lineStyle(1, 0x00ff44, 0.6).moveTo(0,0).lineTo(panelW * 0.3, 0).strokePath();
        g.generateTexture('line_dec', panelW * 0.3, 2); g.clear();
        this.add.image(w/2 - panelW*0.15 - 70, subY, 'line_dec').setOrigin(0, 0.5).setDepth(2);
        this.add.image(w/2 + 70, subY, 'line_dec').setOrigin(0, 0.5).setDepth(2).setFlipX(true);

        this.add.text(w/2, subY, '✦  MELHOR QUE DO EDIR  ✦', {
            fontSize: '15px', fill: '#88ffaa', letterSpacing: 2
        }).setOrigin(0.5).setDepth(3);

        // ── Recorde ───────────────────────────────────────────────────────
        const itemW = Math.min(panelW - 40, 280); // largura padrão de todos os itens
        const recY = h * 0.365;
        g.fillStyle(0x002200, 0.9).fillRoundedRect(0, 0, itemW, 46, 10);
        g.lineStyle(1, 0xffff00, 0.7).strokeRoundedRect(0, 0, itemW, 46, 10);
        g.generateTexture('rec_bg', itemW, 46); g.clear();
        this.add.image(w/2, recY, 'rec_bg').setOrigin(0.5).setDepth(2);
        this.add.text(w/2, recY, '🏆  RECORDE: ' + highScore, {
            fontSize: '20px', fill: '#ffff00', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(3);

        // ── Botão JOGAR ───────────────────────────────────────────────────
        const playY = h * 0.475;
        const playBtnH = 56;

        g.fillStyle(0x007700, 1).fillRoundedRect(0, 4, itemW, playBtnH, 12);
        g.fillStyle(0x00aa00, 1).fillRoundedRect(0, 0, itemW, playBtnH, 12);
        g.fillStyle(0x00dd00, 0.4).fillRoundedRect(4, 4, itemW-8, playBtnH/2-4, 8);
        g.lineStyle(2, 0x00ff88, 0.8).strokeRoundedRect(0, 0, itemW, playBtnH, 12);
        g.generateTexture('btn_play', itemW, playBtnH+4); g.clear();

        g.fillStyle(0x00ff44, 1).fillRoundedRect(0, 0, itemW, playBtnH, 12);
        g.fillStyle(0xffffff, 0.3).fillRoundedRect(4, 4, itemW-8, playBtnH/2-4, 8);
        g.lineStyle(2, 0xffffff, 0.8).strokeRoundedRect(0, 0, itemW, playBtnH, 12);
        g.generateTexture('btn_play_hover', itemW, playBtnH); g.clear();

        const playImg = this.add.image(w/2, playY, 'btn_play').setOrigin(0.5).setDepth(2).setInteractive();
        const playText = this.add.text(w/2, playY, '▶  JOGAR', {
            fontSize: '26px', fontStyle: 'bold', fill: '#ffffff',
            stroke: '#003300', strokeThickness: 3
        }).setOrigin(0.5).setDepth(3);

        playImg.on('pointerover', () => { playImg.setTexture('btn_play_hover'); playText.setStyle({ fill: '#000', stroke: '#005500' }); });
        playImg.on('pointerout',  () => { playImg.setTexture('btn_play'); playText.setStyle({ fill: '#fff', stroke: '#003300' }); });
        playImg.on('pointerdown', () => {
            this.cameras.main.flash(200, 0, 255, 0);
            this.time.delayedCall(150, () => this.scene.start('GameScene'));
        });

        // ── Botão DIFICULDADE ─────────────────────────────────────────────
        const diffY = h * 0.585;
        const diffBtnH = 50;

        g.fillStyle(0x111111, 0.95).fillRoundedRect(0, 0, itemW, diffBtnH, 10);
        g.lineStyle(2, 0x444444, 1).strokeRoundedRect(0, 0, itemW, diffBtnH, 10);
        g.generateTexture('btn_diff', itemW, diffBtnH); g.clear();

        g.fillStyle(0x1a1a1a, 0.95).fillRoundedRect(0, 0, itemW, diffBtnH, 10);
        g.lineStyle(2, 0x00ff88, 0.8).strokeRoundedRect(0, 0, itemW, diffBtnH, 10);
        g.generateTexture('btn_diff_hover', itemW, diffBtnH); g.clear();

        const diffImg = this.add.image(w/2, diffY, 'btn_diff').setOrigin(0.5).setDepth(2).setInteractive();

        const diffColors = { 'Facil': '#00ff88', 'Medio': '#ffff00', 'Dificil': '#ff4444' };
        const diffIcons  = { 'Facil': '🟢', 'Medio': '🟡', 'Dificil': '🔴' };
        const diffText = this.add.text(w/2, diffY, '', {
            fontSize: '16px', fontStyle: 'bold', fill: diffColors[difficulty]
        }).setOrigin(0.5).setDepth(3);

        const updateDiff = () => {
            diffText.setText('DIFICULDADE:  ' + diffIcons[difficulty] + '  ' + difficulty);
            diffText.setStyle({ fill: diffColors[difficulty] });
        };
        updateDiff();

        diffImg.on('pointerover', () => diffImg.setTexture('btn_diff_hover'));
        diffImg.on('pointerout',  () => diffImg.setTexture('btn_diff'));
        diffImg.on('pointerdown', () => {
            if (difficulty === 'Facil') difficulty = 'Medio';
            else if (difficulty === 'Medio') difficulty = 'Dificil';
            else difficulty = 'Facil';
            updateDiff();
            this.tweens.add({ targets: diffText, scaleX: 1.2, scaleY: 1.2, duration: 80, yoyo: true });
        });

        // ── Instruções ────────────────────────────────────────────────────
        const instrY = h * 0.70;
        g.fillStyle(0x000000, 0.4).fillRoundedRect(0, 0, itemW, 58, 8);
        g.lineStyle(1, 0x224422, 1).strokeRoundedRect(0, 0, itemW, 58, 8);
        g.generateTexture('instr_bg', itemW, 58); g.clear();
        this.add.image(w/2, instrY, 'instr_bg').setOrigin(0.5).setDepth(2);

        this.add.text(w/2, instrY - 12, '🕹  Joystick esquerdo = mover', {
            fontSize: '13px', fill: '#77aa77'
        }).setOrigin(0.5).setDepth(3);
        this.add.text(w/2, instrY + 10, '🔴  FOGO BB = atirar   |   100 pts = AURA+99', {
            fontSize: '13px', fill: '#77aa77'
        }).setOrigin(0.5).setDepth(3);

        // ── Hint piscando ─────────────────────────────────────────────────
        const hint = this.add.text(w/2, h * 0.895, '— toque em JOGAR para começar —', {
            fontSize: '13px', fill: '#336633', letterSpacing: 1
        }).setOrigin(0.5).setDepth(3);
        this.tweens.add({ targets: hint, alpha: 0.1, duration: 900, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

        // ── Versão ────────────────────────────────────────────────────────
        this.add.text(w - 10, h - 10, 'v2.0 PHONK ED.', {
            fontSize: '11px', fill: '#224422'
        }).setOrigin(1, 1).setDepth(3);

        // ── Animação de entrada dos elementos ─────────────────────────────
        [titleText, playImg, playText, diffImg, diffText].forEach((obj, i) => {
            obj.setAlpha(0).setY(obj.y + 20);
            this.tweens.add({
                targets: obj, alpha: 1, y: obj.y - 20,
                duration: 400, delay: i * 80, ease: 'Back.easeOut'
            });
        });
    }
}

class GameScene extends Phaser.Scene {
    constructor() { super('GameScene'); }

    preload() {
        this.load.audio('som_tiro',    'https://labs.phaser.io/assets/audio/SoundEffects/blaster.mp3');
        this.load.audio('som_explosao','https://labs.phaser.io/assets/audio/SoundEffects/explosion.mp3');
    }

    create() {
        score = 0; health = 6; isUltActive = false; ultAvailable = false;
        isInvulnerable = false; lastFired = 0;

        let bgm = this.sound.get('musica_fundo') || this.sound.add('musica_fundo', { volume: 0.4, loop: true });
        if (!bgm.isPlaying) bgm.play();

        this.input.addPointer(4);
        const g = this.make.graphics({x: 0, y: 0, add: false});

        g.fillStyle(0x0a1a05).fillRect(0, 0, 40, 40);
        g.fillStyle(0x2d5a27).fillCircle(20, 18, 18);
        g.generateTexture('wall', 40, 40); g.clear();
        g.fillStyle(0xe74c3c).fillRect(6, 8, 20, 16).fillStyle(0xffffff).fillRect(14, 0, 4, 14);
        g.generateTexture('tank_p', 32, 32); g.clear();
        const drawEnemy = (color) => { g.fillStyle(color).fillRect(6, 8, 20, 16).fillStyle(0x000000).fillRect(14, 0, 4, 14); };
        drawEnemy(0x34495e); g.generateTexture('tank_e1', 32, 32); g.clear();
        drawEnemy(0x8e44ad); g.generateTexture('tank_e2', 32, 32); g.clear();
        drawEnemy(0xf1c40f); g.generateTexture('tank_e3', 32, 32); g.clear();
        g.fillStyle(0xffff00).fillCircle(3, 3, 3); g.generateTexture('bullet_p', 6, 6); g.clear();
        g.fillStyle(0x00ffff).fillCircle(3, 3, 3); g.generateTexture('bullet_ult', 6, 6); g.clear();
        g.fillStyle(0xffa500).fillCircle(3, 3, 3); g.generateTexture('bullet_e', 6, 6); g.clear();
        g.fillStyle(0xffffff).fillRect(0, 0, 2, 2); g.generateTexture('flare', 2, 2); g.clear();
        g.fillStyle(0xaaaaaa).fillCircle(4, 4, 4); g.generateTexture('smoke', 8, 8); g.clear();
        g.fillStyle(0xff0000).fillCircle(10, 10, 10).fillStyle(0xffffff).fillRect(8, 4, 4, 12).fillRect(4, 8, 12, 4);
        g.generateTexture('heart', 20, 20); g.clear();

        // ── Textura da cápsula de bala (cartucho dourado) ──────────────────
        g.fillStyle(0xb8860b).fillRoundedRect(0, 0, 5, 11, 1);     // sombra/base
        g.fillStyle(0xd4a017).fillRoundedRect(0, 0, 4, 10, 1);     // corpo dourado
        g.fillStyle(0xf5c842).fillRoundedRect(1, 1, 2, 6, 1);      // reflexo claro
        g.fillStyle(0xffd700).fillRoundedRect(0, 0, 4, 2, { tl: 1, tr: 1, bl: 0, br: 0 }); // boca brilhante
        g.fillStyle(0x7a5c00).fillRoundedRect(0, 8, 4, 2, { bl: 1, br: 1, tl: 0, tr: 0 }); // base escura (percussão)
        g.generateTexture('casing', 5, 11); g.clear();

        maze = this.physics.add.staticGroup();
        const w = this.scale.width, h = this.scale.height;
        const cols = Math.floor(w / 40), rows = Math.floor(h / 40);
        for (let y = 0; y < rows; y++) {
            for (let x = 0; x < cols; x++) {
                if (y === 0 || y === rows - 1 || x === 0 || x === cols - 1 || (x % 2 === 0 && y % 2 === 0 && Math.random() > 0.4)) {
                    maze.create(x * 40 + 20, y * 40 + 20, 'wall');
                }
            }
        }

        particleManager = this.add.particles(0, 0, 'flare', { speed: 100, scale: { start: 1, end: 0 }, lifespan: 400, blendMode: 'ADD', emitting: false });
        smokeManager    = this.add.particles(0, 0, 'smoke', { speed: { min: 20, max: 60 }, scale: { start: 1.0, end: 3.5 }, alpha: { start: 0.7, end: 0 }, lifespan: { min: 500, max: 1000 }, emitting: false });

        player       = this.physics.add.sprite(60, 60, 'tank_p').setCollideWorldBounds(true).setDrag(0.9);
        bullets      = this.physics.add.group();
        enemyBullets = this.physics.add.group();
        enemies      = this.physics.add.group();
        healthPowerup = this.physics.add.sprite(-100, -100, 'heart').setVisible(false);
        casingGroup  = this.add.group();

        scoreText  = this.add.text(20, 20, 'Score: 0', { fontSize: '20px', fill: '#fff' }).setDepth(200);
        healthText = this.add.text(20, 45, 'HP: 3/3', { fontSize: '20px', fill: '#fff' }).setDepth(200);
        this.add.text(20, 70, 'MODO: ' + difficulty, { fontSize: '13px', fill: '#aaa' }).setDepth(200);

        const pauseBtn = this.add.text(w - 20, 20, 'MENU', {
            fontSize: '16px', fill: '#aaffaa', backgroundColor: '#001100', padding: { x: 8, y: 4 }
        }).setOrigin(1, 0).setDepth(200).setInteractive();
        pauseBtn.on('pointerdown', () => {
            if (score > highScore) { highScore = score; localStorage.setItem('tankHighScore', highScore); }
            this.scene.start('MenuScene');
        });

        joyBase  = this.add.circle(0, 0, 55, 0x000000, 0.4).setVisible(false).setDepth(200);
        joyThumb = this.add.circle(0, 0, 30, 0xffffff, 0.6).setVisible(false).setDepth(201);

        const btnX = w - 100, btnY = h - 100;
        fireBtn = this.add.circle(btnX, btnY, 50, 0xff0000, 0.5).setInteractive().setDepth(200);
        this.add.text(btnX, btnY, 'FOGO BB', { fontSize: '16px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5).setDepth(201);
        ultBtn  = this.add.circle(btnX - 120, btnY, 40, 0x00aaff, 0.5).setInteractive().setDepth(200).setVisible(false);
        ultText = this.add.text(btnX - 120, btnY, 'AURA+99', { fontSize: '12px', fontStyle: 'bold', fill: '#fff' }).setOrigin(0.5).setDepth(201).setVisible(false);

        ultBtn.on('pointerdown', activateUltimate, this);
        fireBtn.on('pointerdown', () => { if (player.active && player.visible) { fireBtn.setAlpha(1); firePlayerBullet.call(this); } });
        fireBtn.on('pointerup',   () => fireBtn.setAlpha(0.5));

        this.input.on('pointerdown', (p) => { if (p.x < w / 2) { joyActivePointer = p; joyBase.setPosition(p.x, p.y).setVisible(true); joyThumb.setPosition(p.x, p.y).setVisible(true); } });
        this.input.on('pointermove', (p) => { if (p === joyActivePointer) { let a = Phaser.Math.Angle.Between(joyBase.x, joyBase.y, p.x, p.y); let d = Math.min(Phaser.Math.Distance.Between(joyBase.x, joyBase.y, p.x, p.y), 55); joyThumb.setPosition(joyBase.x + Math.cos(a) * d, joyBase.y + Math.sin(a) * d); joyVector.set(Math.cos(a) * (d/55), Math.sin(a) * (d/55)); } });
        this.input.on('pointerup',   (p) => { if (p === joyActivePointer) { joyActivePointer = null; joyBase.setVisible(false); joyThumb.setVisible(false); joyVector.set(0, 0); } });

        this.physics.add.collider([player, enemies], maze);
        this.physics.add.collider(enemyBullets, maze, (b) => b.destroy());
        this.physics.add.collider(bullets, maze, (b) => { if (!isUltActive) b.destroy(); }, (b) => !isUltActive);

        this.physics.add.overlap(bullets, enemies, (b, e) => {
            this.sound.play('som_explosao', { volume: 0.6 });
            this.cameras.main.shake(200, 0.03);
            particleManager.emitParticleAt(e.x, e.y, 25); b.destroy(); e.destroy();
            score += 10; scoreText.setText('Score: ' + score);
            checkUltStatus();
            this.time.delayedCall(3500, () => spawnEnemy.call(this));
        });

        this.physics.add.overlap(enemyBullets, player, (p, b) => { if (!isInvulnerable) { b.destroy(); takeDamage.call(this); } });
        this.physics.add.overlap(player, healthPowerup, () => {
            if (healthPowerup.visible) {
                if (health < 3) health++;
                healthText.setText('HP: ' + health + '/3');
                healthPowerup.setVisible(false).setPosition(-100, -100);
                this.time.delayedCall(6000, spawnHeart, [], this);
            }
        });

        for (let i = 0; i < MAX_ENEMIES; i++) spawnEnemy.call(this);
        this.time.delayedCall(6000, spawnHeart, [], this);
    }

    update() {
        if (!player.active || !player.visible) return;
        player.setVelocity(joyVector.x * 210, joyVector.y * 210);
        if (joyVector.lengthSq() > 0) player.setRotation(joyVector.angle() + Math.PI/2);

        bullets.children.iterate(b => {
            if (b && b.active) {
                smokeManager.emitParticleAt(b.x, b.y, 3, {
                    tint: isUltActive ? 0x00ffff : 0xaaaaaa,
                    scale: { start: 0.5, end: 1.5 },
                    alpha: { start: 0.6, end: 0 },
                    lifespan: 300
                });
            }
        });

        enemyBullets.children.iterate(b => {
            if (b && b.active) {
                smokeManager.emitParticleAt(b.x, b.y, 1, {
                    tint: 0xff4400,
                    scale: { start: 0.2, end: 0.6 },
                    alpha: { start: 0.25, end: 0 },
                    lifespan: 120
                });
            }
        });

        enemies.children.iterate(e => {
            if (e && e.active) {
                let distance      = Phaser.Math.Distance.Between(e.x, e.y, player.x, player.y);
                let angleToPlayer = Phaser.Math.Angle.Between(e.x, e.y, player.x, player.y);
                let baseSpeed     = difficulty === 'Facil' ? 50 : (difficulty === 'Dificil' ? 130 : 80);
                let speed         = e.eliteLevel === 3 ? baseSpeed + 60 : (e.eliteLevel === 2 ? baseSpeed + 30 : baseSpeed);
                if (distance > 200) this.physics.velocityFromRotation(angleToPlayer, speed, e.body.velocity);
                else {
                    let sv = new Phaser.Math.Vector2();
                    this.physics.velocityFromRotation(angleToPlayer + Math.PI/2, speed, sv);
                    e.setVelocity(sv.x, sv.y);
                }
                e.setRotation(angleToPlayer + Math.PI/2);
                if (this.time.now > (e.lastFired || 0)) {
                    fireEnemyBullet.call(this, e);
                    let fireBase = difficulty === 'Facil' ? 3000 : (difficulty === 'Dificil' ? 1200 : 2200);
                    let fireRate = e.eliteLevel === 3 ? fireBase * 0.4 : (e.eliteLevel === 2 ? fireBase * 0.7 : fireBase);
                    e.lastFired  = this.time.now + fireRate;
                }
            }
        });
    }
}

let player, bullets, enemyBullets, enemies, maze, particleManager, smokeManager, healthPowerup, casingGroup;
let score = 0, health = 6, scoreText, healthText, ultBtn, ultText;
let joyBase, joyThumb, joyActivePointer = null, joyVector = new Phaser.Math.Vector2(0, 0);
let fireBtn, isInvulnerable = false, lastFired = 0;
let isUltActive = false, ultAvailable = false;
const MAX_ENEMIES = 3;

// ── Animação de cápsula ejetada ──────────────────────────────────────────────
function ejectCasing(scene) {
    // Ângulo de disparo (para frente do tanque)
    const barrelAngle = player.rotation - Math.PI / 2;

    // Cápsula é ejetada 90° à direita do cano (câmara de ejeção lateral)
    const ejectAngle = barrelAngle + Math.PI / 2;

    // Posição de spawn: ao lado do tanque (câmara)
    const spawnX = player.x + Math.cos(ejectAngle) * 12;
    const spawnY = player.y + Math.sin(ejectAngle) * 12;

    // Velocidade de ejeção lateral + impulso inicial
    const ejectSpeed  = Phaser.Math.Between(70, 130);
    const riseAmount  = Phaser.Math.Between(15, 35); // simula "arco" da cápsula
    const spinRad     = Phaser.Math.FloatBetween(6, 14) * (Math.random() > 0.5 ? 1 : -1);

    // Tempos das fases
    const riseDur = Phaser.Math.Between(100, 180);
    const fallDur = Phaser.Math.Between(200, 350);

    // Deslocamento total
    const dx = Math.cos(ejectAngle) * ejectSpeed * ((riseDur + fallDur) / 1000);
    const dy = Math.sin(ejectAngle) * ejectSpeed * ((riseDur + fallDur) / 1000);

    // Pico do arco (meio do caminho, um pouco acima)
    const peakX = spawnX + dx * 0.4;
    const peakY = spawnY + dy * 0.4 - riseAmount;

    // Destino final
    const landX = spawnX + dx;
    const landY = spawnY + dy;

    // Cor da cápsula: dourada normal, azul ciano para ultimate
    const casingTint = isUltActive ? 0x00eeff : 0xd4a017;

    const casing = scene.add.image(spawnX, spawnY, 'casing')
        .setOrigin(0.5)
        .setRotation(player.rotation)
        .setDepth(2)
        .setAlpha(1)
        .setTint(casingTint);

    casingGroup.add(casing);

    // ── Fase 1: arco para cima ───────────────────────────────────────────────
    scene.tweens.add({
        targets: casing,
        x: peakX,
        y: peakY,
        rotation: casing.rotation + spinRad * (riseDur / 1000),
        scaleX: 1.15,
        scaleY: 0.85,
        duration: riseDur,
        ease: 'Sine.easeOut',
        onComplete: () => {
            // ── Fase 2: queda com bounce ──────────────────────────────────────
            scene.tweens.add({
                targets: casing,
                x: landX,
                y: landY,
                rotation: casing.rotation + spinRad * (fallDur / 1000),
                scaleX: 0.9,
                scaleY: 0.9,
                duration: fallDur,
                ease: 'Bounce.easeOut',
                onComplete: () => {
                    // ── Fase 3: rolagem residual curta ────────────────────────
                    scene.tweens.add({
                        targets: casing,
                        x: landX + Math.cos(ejectAngle) * Phaser.Math.Between(3, 10),
                        y: landY + Math.sin(ejectAngle) * Phaser.Math.Between(2, 6),
                        rotation: casing.rotation + spinRad * 0.1,
                        duration: 150,
                        ease: 'Quad.easeOut',
                        onComplete: () => {
                            // ── Fase 4: fade out lento no chão ────────────────
                            scene.tweens.add({
                                targets: casing,
                                alpha: 0,
                                scaleX: 0.7,
                                scaleY: 0.7,
                                duration: 800,
                                delay: 600,
                                ease: 'Linear',
                                onComplete: () => casing.destroy()
                            });
                        }
                    });
                }
            });
        }
    });

    // Flash brilhante rápido no spawn (calor do disparo)
    scene.tweens.add({
        targets: casing,
        tint: { from: 0xffffff, to: casingTint },
        duration: 60,
        ease: 'Linear'
    });
}

function spawnHeart() {
    if (healthPowerup.visible) return;
    let x = Phaser.Math.Between(100, this.scale.width - 100);
    let y = Phaser.Math.Between(100, this.scale.height - 100);
    healthPowerup.setPosition(x, y).setVisible(true);
}

function checkUltStatus() {
    if (score >= 100 && !ultAvailable && !isUltActive) {
        ultAvailable = true; ultBtn.setVisible(true).setAlpha(1); ultText.setVisible(true).setText('AURA+99!');
    }
}

function activateUltimate() {
    if (!ultAvailable) return;
    ultAvailable = false; isUltActive = true; ultBtn.setAlpha(0.3);
    let timeLeft = 7;
    const timer = this.time.addEvent({ delay: 1000, repeat: 7, callback: () => {
        ultText.setText(timeLeft + 's');
        if (timeLeft <= 0) {
            isUltActive = false; ultBtn.setVisible(false); ultText.setVisible(false);
            score = 0; scoreText.setText('Score: 0');
            timer.remove();
        }
        timeLeft--;
    }});
}

function firePlayerBullet() {
    if (this.time.now < lastFired) return;
    lastFired = this.time.now + 90;
    this.sound.play('som_tiro', { volume: 0.4 });

    // ── Ejetar cápsula ───────────────────────────────────────────────────────
    ejectCasing(this);

    const texture = isUltActive ? 'bullet_ult' : 'bullet_p';
    let b = bullets.create(player.x, player.y, texture);
    if (b) {
        let angle = player.rotation - Math.PI/2;
        this.physics.velocityFromRotation(angle, 550, b.body.velocity);
        let smokeTint = isUltActive ? 0x00ffff : 0xaaaaaa;
        smokeManager.emitParticleAt(player.x, player.y, 25, {
            speed: { min: 40, max: 120 }, scale: { start: 1.5, end: 4.5 },
            tint: smokeTint, alpha: { start: 0.8, end: 0 }
        });
        this.time.delayedCall(isUltActive ? 3000 : 1200, () => { if (b && b.active) b.destroy(); });
    }
}

function fireEnemyBullet(enemy) {
    if (!player.visible) return;
    let b = enemyBullets.create(enemy.x, enemy.y, 'bullet_e');
    if (b) {
        let a = Phaser.Math.Angle.Between(enemy.x, enemy.y, player.x, player.y);
        this.physics.velocityFromRotation(a, 280, b.body.velocity);
        this.time.delayedCall(2000, () => { if (b && b.active) b.destroy(); });
    }
}

function takeDamage() {
    health--;
    healthText.setText('HP: ' + Math.max(0, health) + '/3');
    particleManager.emitParticleAt(player.x, player.y, 25);
    this.cameras.main.shake(300, 0.05);
    if (health <= 0) {
        if (score > highScore) { highScore = score; localStorage.setItem('tankHighScore', highScore); }
        player.setVisible(false);
        this.add.text(this.scale.width/2, this.scale.height/2 - 30, 'MT RUIMLIXO!', {
            fontSize: '40px', fill: '#f00', fontStyle: 'bold'
        }).setOrigin(0.5).setDepth(300);
        this.add.text(this.scale.width/2, this.scale.height/2 + 30, 'SCORE: ' + score, {
            fontSize: '24px', fill: '#fff'
        }).setOrigin(0.5).setDepth(300);
        this.time.delayedCall(2500, () => this.scene.start('MenuScene'));
    } else {
        isInvulnerable = true; player.setAlpha(0.5); player.setPosition(60, 60);
        this.time.delayedCall(1500, () => { isInvulnerable = false; player.setAlpha(1); });
    }
}

function spawnEnemy() {
    if (enemies.countActive() >= MAX_ENEMIES) return;
    let x = Phaser.Math.Between(100, this.scale.width - 100);
    let y = Phaser.Math.Between(100, this.scale.height - 100);
    let level = 1, texture = 'tank_e1';
    if (score > 300) { level = 3; texture = 'tank_e3'; } else if (score > 100) { level = 2; texture = 'tank_e2'; }
    let enemy = enemies.create(x, y, texture);
    enemy.eliteLevel = level;
    enemy.setBounce(0.5).setCollideWorldBounds(true);
}

const config = {
    type: Phaser.AUTO,
    width: Math.max(window.innerWidth, window.innerHeight),
    height: Math.min(window.innerWidth, window.innerHeight),
    backgroundColor: '#1e3d1a',
    scale: { mode: Phaser.Scale.RESIZE, autoCenter: Phaser.Scale.CENTER_BOTH },
    physics: { default: 'arcade', arcade: { gravity: { y: 0 } } },
    scene: [MenuScene, GameScene]
};

const game = new Phaser.Game(config);
</script>
</body>
